name: capstone
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10  # עדיף 3.10 ליציבות עם Metaflow ו-MLflow
  - numpy
  - pandas
  - scikit-learn<1.4.0  # קריטי! זה פותר את השגיאה של ה-'squared'
  - xgboost
  - matplotlib
  - seaborn
  - pyarrow
  - ipykernel
  - pip
  - pip:
      - mlflow>=2.11.0  
      - optuna
      - metaflow  # אל תשכחי להוסיף את זה, אחרת הקוד לא ירוץ
      - nannyml   # אם את משתמשת בו לבדיקת דריפט